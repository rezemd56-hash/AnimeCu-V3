<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeCu - Menú de Contenidos</title>
    <style>
        /* Estilo General AnimeCu */
        body {
            background-color: #0d0216;
            color: #d1b3ff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #bc8aff;
            text-shadow: 0 0 15px #7a2cff;
            margin-bottom: 25px;
            font-size: 2.5rem;
        }

        /* Botones de Talla */
        .tallas-box {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-talla {
            background: #1a0b2e;
            color: white;
            border: 2px solid #7a2cff;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-talla:hover {
            background: #7a2cff;
            box-shadow: 0 0 15px #bc8aff;
            transform: translateY(-2px);
        }

        /* Contenedor del Reproductor */
        .reproductor-container {
            width: 100%;
            max-width: 850px;
            background: #000;
            border: 2px solid #3d1b6e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
        }

        /* CUADRO FLOTANTE CON SCROLL */
        #cuadroContenidos {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            max-height: 75vh;
            background: rgba(20, 10, 35, 0.98);
            border: 2px solid #bc8aff;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 30px rgba(122, 44, 255, 0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        /* Header del Menú */
        .header-cuadro {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid #4c1d95;
            padding-bottom: 15px;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: #140a23;
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-cuadro span {
            font-weight: bold;
            font-size: 0.9em;
            color: #bc8aff;
            letter-spacing: 1px;
        }

        /* Buscador */
        .search-box {
            width: 100%;
            padding: 8px 12px;
            background: #0d0216;
            border: 1px solid #7a2cff;
            border-radius: 6px;
            color: #d1b3ff;
            font-size: 0.85em;
            outline: none;
            box-sizing: border-box;
        }

        .search-box::placeholder {
            color: #4c1d95;
        }

        .btn-cerrar {
            background: #ff4444;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        /* Secciones y Grids */
        .seccion-contenedor {
            margin-bottom: 20px;
        }

        .seccion-titulo {
            background: #2e1065;
            color: #bc8aff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 10px;
            border-left: 4px solid #bc8aff;
        }

        .grid-contenidos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .item-video {
            background: #1a0b2e;
            padding: 12px 5px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            border: 1px solid #3d1b6e;
            transition: 0.2s;
            color: #d1b3ff;
        }

        .item-video:hover {
            background: #4c1d95;
            border-color: #bc8aff;
        }

        .item-video.active {
            background: #bc8aff;
            color: #0d0216;
            font-weight: bold;
            border-color: #fff;
        }

        /* Ajuste para móviles */
        @media (max-width: 480px) {
            #cuadroContenidos {
                width: 90%;
                right: 5%;
                left: 5%;
                bottom: 10px;
                max-height: 60vh;
            }
        }
    </style>
</head>
<body>

    <h1>AnimeCu</h1>

    <div class="tallas-box">
        <button class="btn-talla" onclick="abrirCuadro()">Talla S</button>
        <button class="btn-talla" onclick="abrirCuadro()">Talla M</button>
        <button class="btn-talla" onclick="abrirCuadro()">Talla L</button>
    </div>

    <div class="reproductor-container">
        <video id="videoMain" controls poster="https://via.placeholder.com/800x450/0d0216/bc8aff?text=Selecciona+un+video">
            <source id="videoSrc" src="https://files.clonix.cam/videos/315cbd514cef.mp4" type="video/mp4">
        </video>
    </div>

    <div id="cuadroContenidos">
        <div class="header-cuadro">
            <div class="header-top">
                <span>MENÚ DE CONTENIDOS</span>
                <button class="btn-cerrar" onclick="cerrarCuadro()">×</button>
            </div>
            <input type="text" id="searchInput" class="search-box" placeholder="Buscar serie o capítulo..." onkeyup="filtrarContenidos()">
        </div>
        
        <div id="listaMaestra">
            </div>
    </div>

    <script>
        const contenidos = [
            {
                titulo: "Kitsune Musume no Ecchi na Oyado", 
                videos: [
                    { nombre: "Cap 1", url: "https://files.clonix.cam/videos/315cbd514cef.mp4" },
                    { nombre: "Cap 2", url: "" },
                    { nombre: "Parte 2 Cap 2", url: "" }
                ]
            },
            { titulo: "Bocchi", videos: [{ nombre: "Bocchi en su práctica", url: "https://files.clonix.cam/videos/1859d9fa470d.mp4" }] },
            { titulo: "El duro trabajo de Varesa", videos: [{ nombre: "Varesa", url: "https://files.clonix.cam/videos/1e437866ecdd.mp4" }] },
            { titulo: "Contenido 4", videos: [{ nombre: "Video 4.1", url: "" }] },
            { titulo: "Contenido 5", videos: [{ nombre: "Video 5.1", url: "" }] },
            { titulo: "Contenido 6", videos: [{ nombre: "Video 6.1", url: "" }] },
            { titulo: "Contenido 7", videos: [{ nombre: "Video 7.1", url: "" }] },
            { titulo: "Contenido 8", videos: [{ nombre: "Video 8.1", url: "" }] },
            { titulo: "Contenido 9", videos: [{ nombre: "Video 9.1", url: "" }] },
            { titulo: "Contenido 10", videos: [{ nombre: "Video 10.1", url: "" }] }
        ];

        function cargarMenu(filtro = "") {
            const lista = document.getElementById('listaMaestra');
            const videoActual = document.getElementById('videoSrc').src;
            lista.innerHTML = '';

            contenidos.forEach(seccion => {
                // Filtrar videos que coincidan con la búsqueda
                const videosFiltrados = seccion.videos.filter(vid => 
                    seccion.titulo.toLowerCase().includes(filtro.toLowerCase()) || 
                    vid.nombre.toLowerCase().includes(filtro.toLowerCase())
                );

                if (videosFiltrados.length > 0) {
                    const contenedorSeccion = document.createElement('div');
                    contenedorSeccion.className = 'seccion-contenedor';

                    const divTitulo = document.createElement('div');
                    divTitulo.className = 'seccion-titulo';
                    divTitulo.innerText = seccion.titulo;
                    contenedorSeccion.appendChild(divTitulo);

                    const grid = document.createElement('div');
                    grid.className = 'grid-contenidos';

                    videosFiltrados.forEach(vid => {
                        const item = document.createElement('div');
                        item.className = 'item-video';
                        item.innerText = vid.nombre;

                        if(vid.url !== "" && videoActual.includes(vid.url)) {
                            item.classList.add('active');
                        }

                        if(vid.url === "") {
                            item.style.opacity = "0.4";
                            item.style.cursor = "default";
                        }

                        item.onclick = function() { 
                            if(vid.url !== "") {
                                cambiarVideo(vid.url, vid.nombre, this); 
                            } else {
                                alert("Próximamente: " + vid.nombre);
                            }
                        };
                        grid.appendChild(item);
                    });

                    contenedorSeccion.appendChild(grid);
                    lista.appendChild(contenedorSeccion);
                }
            });
        }

        function filtrarContenidos() {
            const texto = document.getElementById('searchInput').value;
            cargarMenu(texto);
        }

        function abrirCuadro() {
            document.getElementById('cuadroContenidos').style.display = 'block';
        }

        function cerrarCuadro() {
            document.getElementById('cuadroContenidos').style.display = 'none';
        }

        function cambiarVideo(url, nombre, elemento) {
            const video = document.getElementById('videoMain');
            const source = document.getElementById('videoSrc');
            source.src = url;
            video.load();
            video.play();
            document.querySelectorAll('.item-video').forEach(i => i.classList.remove('active'));
            elemento.classList.add('active');
        }

        window.onload = () => cargarMenu();
    </script>
</body>
</html>
